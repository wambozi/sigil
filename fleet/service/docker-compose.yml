version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fleet
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  fleet-service:
    build:
      context: ../..
      dockerfile: fleet/service/Dockerfile
    ports:
      - "8080:8080"
    environment:
      LISTEN_ADDR: ":8080"
      DB_URL: "postgres://fleet:fleet@postgres:5432/fleet?sslmode=disable"
      API_KEY: "dev-api-key"
    depends_on:
      - postgres

volumes:
  pgdata:
