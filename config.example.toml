# Sigil daemon configuration
# Copy to ~/.config/sigil/config.toml and edit as needed.
# All paths support ~ expansion.

[notifier]
# 0 = silent (store only, query via sigilctl)
# 1 = digest (one daily summary at digest_time)
# 2 = ambient (real-time toasts, no actions) — default
# 3 = conversational (toasts with action buttons)
# 4 = autonomous (auto-execute high-confidence actions)
level = 2

[collector]
# Directories to watch for file-system events.
watch_dirs = ["~/code"]
# Patterns to ignore (matched against full path).
ignore_patterns = [".git", "node_modules", "vendor", "__pycache__", ".next", "dist"]

[inference]
# Routing mode: local | localfirst | remotefirst | remote
mode = "localfirst"

[inference.local]
# Enable local inference backend (e.g. llama-server).
enabled = false
# server_url = "http://127.0.0.1:8081"
# server_bin = "/usr/bin/llama-server"
# model_path = ""
# ctx_size = 4096
# gpu_layers = 0

[inference.cloud]
# Enable cloud inference backend.
enabled = false
# provider = "openai"     # "openai" or "anthropic"
# base_url = ""
# api_key = ""
# model = ""

[schedule]
# How often to run a full analysis cycle.
analyze_every = "1h"
# Time to deliver the daily digest (level 1 only). 24h format, local time.
digest_time = "09:00"

[store]
# SQLite database path. Default: $XDG_DATA_HOME/sigild/data.db
# db_path = "~/.local/share/sigild/data.db"

[socket]
# Unix socket path. Default: $XDG_RUNTIME_DIR/sigild.sock
# socket_path = "/run/user/1000/sigild.sock"

[network]
# Enable the optional TCP+TLS listener for remote sigil-shell connections.
# Disabled by default. When enabled, generates a self-signed TLS cert on
# first start at $XDG_DATA_HOME/sigil/server-cert.pem.
enabled = false
# bind = "0.0.0.0"          # IP address to listen on (default: all interfaces)
# port = 7773                # TCP port (default: 7773)
# allowed_credentials = []   # Optional allowlist of credential IDs.
                              # Empty = all valid (non-revoked) tokens accepted.
