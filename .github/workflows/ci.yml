name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Build & Test (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install staticcheck
        if: runner.os != 'Windows'
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Check (fmt, vet, lint, test -race)
        if: runner.os != 'Windows'
        run: make check

      - name: Check (Windows — vet + test)
        if: runner.os == 'Windows'
        run: |
          go vet ./...
          go test -race ./...

      - name: Build core (sigild + sigilctl)
        run: make build

      - name: Build plugins
        shell: bash
        run: |
          for p in ./plugins/sigil-plugin-*/; do
            echo "Building $(basename $p)..."
            go build "$p"
          done

      - name: Test plugins
        shell: bash
        run: go test ./plugins/...

      - name: Cross-compile check (Windows target)
        if: runner.os == 'Linux'
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build ./cmd/sigild/...
          go build ./cmd/sigilctl/...

  build-app:
    name: Build sigil-app (${{ matrix.os }})
    needs: [check]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build sigil-app
        run: cd cmd/sigil-app && wails build

      - name: Verify binary size < 15MB
        shell: bash
        run: |
          if [ -f cmd/sigil-app/build/bin/sigil-app ]; then
            BIN=cmd/sigil-app/build/bin/sigil-app
          elif [ -f cmd/sigil-app/build/bin/sigil-app.app/Contents/MacOS/sigil-app ]; then
            BIN=cmd/sigil-app/build/bin/sigil-app.app/Contents/MacOS/sigil-app
          else
            echo "FAIL: sigil-app binary not found"
            exit 1
          fi
          SIZE=$(wc -c < "$BIN" | tr -d ' ')
          echo "sigil-app binary: $((SIZE / 1024 / 1024))MB"
          [ "$SIZE" -le $((15 * 1024 * 1024)) ] || { echo "FAIL: exceeds 15MB"; exit 1; }

      - name: Run Go backend tests
        run: go test ./cmd/sigil-app/... || echo "WARN: sigil-app Go tests skipped (Wails build tags)"

      - name: Upload sigil-app artifact
        uses: actions/upload-artifact@v4
        with:
          name: sigil-app-${{ matrix.os }}
          path: cmd/sigil-app/build/bin/

  test-frontend:
    name: Test Frontend
    needs: [check]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd cmd/sigil-app/frontend && npm install

      - name: Run tests
        run: cd cmd/sigil-app/frontend && npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: cmd/sigil-app/frontend/test-results/
          if-no-files-found: ignore

  build-vscode:
    name: Build VS Code Extension
    needs: [check]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build extension
        run: |
          cd extensions/vscode
          npm install
          npm run compile

      - name: Package .vsix
        run: |
          cd extensions/vscode
          npx @vscode/vsce package --no-dependencies -o sigil-vscode.vsix

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: extensions/vscode/sigil-vscode.vsix

  build-fleet:
    name: Build Fleet
    needs: [check]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: fleet/service/go.mod
          cache: true
          cache-dependency-path: fleet/service/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fleet dashboard — install & build
        run: |
          cd fleet/dashboard
          npm install
          npm run build

      - name: Fleet service — test & build
        run: |
          cd fleet/service
          go test ./...
          go build .

      - name: Helm lint
        run: |
          if command -v helm >/dev/null 2>&1; then
            helm lint fleet/helm/
          else
            echo "helm not installed — skipping lint"
          fi

  smoke:
    name: Smoke Test (${{ matrix.os }})
    needs: [check]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build

      - name: Smoke test — sigild init
        run: |
          ./bin/sigild init --non-interactive

          if [ -f "$HOME/.config/sigil/shell-hook.zsh" ] || [ -f "$HOME/.config/sigil/shell-hook.bash" ]; then
            echo "PASS: shell hook installed"
          else
            echo "FAIL: shell hook not found"
            exit 1
          fi

          if [ -f "$HOME/.config/sigil/config.toml" ]; then
            echo "PASS: config.toml created"
          else
            echo "FAIL: config.toml not found"
            exit 1
          fi

  coverage:
    name: Coverage Gate
    needs: [check]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests with coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Report and enforce coverage gate
        run: |
          TOTAL=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/,"",$NF); print $NF}')
          echo "Total coverage: ${TOTAL}%"
          echo "Minimum required: 50%"
          if [ "$(echo "$TOTAL < 50" | bc -l)" -eq 1 ]; then
            echo "FAIL: coverage ${TOTAL}% is below 50% gate"
            exit 1
          fi
          echo "PASS: coverage ${TOTAL}% meets 50% gate"
