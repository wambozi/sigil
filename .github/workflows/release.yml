name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Sync embedded assets
        run: make sync-assets

      - name: Build all binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${{ github.ref_name }}"
          LDFLAGS="-X main.version=${VERSION}"
          SUFFIX="${{ matrix.goos }}-${{ matrix.goarch }}"
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi

          # Core binaries
          go build -ldflags "${LDFLAGS}" -o "sigild-${SUFFIX}${EXT}" ./cmd/sigild/
          go build -ldflags "${LDFLAGS}" -o "sigilctl-${SUFFIX}${EXT}" ./cmd/sigilctl/

          # All plugins
          for p in ./plugins/sigil-plugin-*/; do
            name=$(basename "$p")
            go build -ldflags "${LDFLAGS}" -o "${name}-${SUFFIX}${EXT}" "$p"
          done

      - name: Generate checksums
        run: |
          SUFFIX="${{ matrix.goos }}-${{ matrix.goarch }}"
          sha256sum *-${SUFFIX}* > "checksums-${SUFFIX}.txt"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            sigild-${{ matrix.goos }}-${{ matrix.goarch }}*
            sigilctl-${{ matrix.goos }}-${{ matrix.goarch }}*
            sigil-plugin-*-${{ matrix.goos }}-${{ matrix.goarch }}*
            checksums-${{ matrix.goos }}-${{ matrix.goarch }}.txt

  build-app:
    name: Build sigil-app (${{ matrix.os }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            artifact: sigil-app-linux-amd64
          - os: macos-latest
            platform: darwin/universal
            artifact: sigil-app-darwin-universal
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build sigil-app
        run: |
          cd cmd/sigil-app
          wails build -ldflags "-X main.version=${{ github.ref_name }}"

      - name: Package macOS app bundle
        if: runner.os == 'macOS'
        run: |
          cd cmd/sigil-app/build/bin
          # Create a zip of the .app bundle for release
          zip -r sigil-app-darwin-universal.zip sigil-app.app

      - name: Package Linux binary
        if: runner.os == 'Linux'
        run: |
          cd cmd/sigil-app/build/bin
          tar czf sigil-app-linux-amd64.tar.gz sigil-app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            cmd/sigil-app/build/bin/*.zip
            cmd/sigil-app/build/bin/*.tar.gz

  release:
    name: Publish Release
    needs: [build, build-app]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sigild-*
            sigilctl-*
            sigil-plugin-*
            sigil-app-*
            checksums-*.txt
