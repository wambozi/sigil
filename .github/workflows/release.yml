name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Sync embedded assets
        run: make sync-assets

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${{ github.ref_name }}"
          LDFLAGS="-X main.version=${VERSION}"
          SUFFIX="${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -ldflags "${LDFLAGS}" -o "sigild-${SUFFIX}" ./cmd/sigild/
          go build -ldflags "${LDFLAGS}" -o "sigilctl-${SUFFIX}" ./cmd/sigilctl/
          for p in ./plugins/sigil-plugin-*/; do
            name=$(basename "$p")
            go build -ldflags "${LDFLAGS}" -o "${name}-${SUFFIX}" "$p"
          done

      - name: Generate checksums
        run: |
          SUFFIX="${{ matrix.goos }}-${{ matrix.goarch }}"
          sha256sum *-${SUFFIX} > "checksums-${SUFFIX}.txt"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            *-${{ matrix.goos }}-${{ matrix.goarch }}
            checksums-${{ matrix.goos }}-${{ matrix.goarch }}.txt

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sigild-*
            sigilctl-*
            sigil-plugin-*
            checksums-*.txt
