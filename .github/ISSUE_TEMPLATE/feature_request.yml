name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What workflow is painful today?
      placeholder: "When I'm working on X, I wish sigil could..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work? Be as specific as you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system does this affect?
      options:
        - sigild (daemon)
        - sigilctl (CLI)
        - Pattern detection
        - Inference engine
        - Actuator system
        - Fleet / enterprise
        - Sync agent
        - Installer / packaging
        - Documentation
        - Other
    validations:
      required: true
